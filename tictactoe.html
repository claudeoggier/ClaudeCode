<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.6em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #controls {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    button {
      padding: 0.6rem 1.4rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      background: #e94560;
      color: #fff;
      transition: background 0.15s;
    }

    button:hover { background: #c73652; }

    #score {
      margin-top: 1.5rem;
      display: flex;
      gap: 2rem;
      font-size: 1rem;
      color: #aaa;
    }

    #score span { font-weight: bold; color: #eee; }

    #mode-toggle {
      background: #0f3460;
    }
    #mode-toggle:hover { background: #16213e; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">X's turn</div>
  <div id="board"></div>
  <div id="controls">
    <button id="restart">Restart</button>
    <button id="mode-toggle">vs Computer</button>
  </div>
  <div id="score">
    X wins: <span id="xwins">0</span>
    &nbsp;|&nbsp;
    Draws: <span id="draws">0</span>
    &nbsp;|&nbsp;
    O wins: <span id="owins">0</span>
  </div>

  <script>
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const restartBtn = document.getElementById('restart');
    const modeBtn = document.getElementById('mode-toggle');

    let board, current, gameOver, vsComputer;
    let score = { X: 0, O: 0, D: 0 };

    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    function init() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      render();
      statusEl.textContent = "X's turn";
    }

    function render() {
      boardEl.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ` ${val.toLowerCase()} taken` : '');
        cell.textContent = val;
        cell.addEventListener('click', () => handleClick(i));
        boardEl.appendChild(cell);
      });
    }

    function handleClick(i) {
      if (gameOver || board[i]) return;
      place(i, current);
    }

    function place(i, player) {
      board[i] = player;
      render();
      const win = checkWin(player);
      if (win) {
        highlight(win);
        statusEl.textContent = `${player} wins!`;
        score[player]++;
        updateScore();
        gameOver = true;
        return;
      }
      if (board.every(c => c)) {
        statusEl.textContent = "It's a draw!";
        score.D++;
        updateScore();
        gameOver = true;
        return;
      }
      current = current === 'X' ? 'O' : 'X';
      statusEl.textContent = `${current}'s turn`;
      if (vsComputer && current === 'O') {
        setTimeout(computerMove, 400);
      }
    }

    function checkWin(player) {
      return WINS.find(combo => combo.every(i => board[i] === player)) || null;
    }

    function highlight(combo) {
      const cells = boardEl.querySelectorAll('.cell');
      combo.forEach(i => cells[i].classList.add('win'));
    }

    function computerMove() {
      if (gameOver) return;
      const move = bestMove();
      place(move, 'O');
    }

    function bestMove() {
      // Try to win
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'O';
          if (checkWin('O')) { board[i] = ''; return i; }
          board[i] = '';
        }
      }
      // Block X
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'X';
          if (checkWin('X')) { board[i] = ''; return i; }
          board[i] = '';
        }
      }
      // Take center
      if (!board[4]) return 4;
      // Take a corner
      const corners = [0,2,6,8].filter(i => !board[i]);
      if (corners.length) return corners[Math.floor(Math.random() * corners.length)];
      // Take any open
      const open = board.map((v,i) => v ? null : i).filter(i => i !== null);
      return open[Math.floor(Math.random() * open.length)];
    }

    function updateScore() {
      document.getElementById('xwins').textContent = score.X;
      document.getElementById('owins').textContent = score.O;
      document.getElementById('draws').textContent = score.D;
    }

    restartBtn.addEventListener('click', init);

    modeBtn.addEventListener('click', () => {
      vsComputer = !vsComputer;
      modeBtn.textContent = vsComputer ? 'vs Human' : 'vs Computer';
      init();
    });

    vsComputer = false;
    init();
  </script>
</body>
</html>
